services:
  - type: web
    name: razbor-agent-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_API_KEY
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://linsivs.github.io

